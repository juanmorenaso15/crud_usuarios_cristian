<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0" th:text="${titulo}"></h3>
            </div>
            <div class="card-body">
                <form th:action="${accion == 'Crear'} ? @{/usuarios/guardar} : @{/usuarios/actualizar/{id}(id=${usuarioId})}" 
                      th:object="${usuarioRequest}" method="post">
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" id="nombre">
                        <div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="text-danger"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" th:field="*{email}" class="form-control" id="email">
                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono:</label>
                        <input type="text" th:field="*{telefono}" class="form-control" id="telefono">
                        <div th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" class="text-danger"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="edad" class="form-label">Edad:</label>
                        <input type="number" th:field="*{edad}" class="form-control" id="edad">
                        <div th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}" class="text-danger"></div>
                    </div>
                    
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary" th:text="${accion}"></button>
                        <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
