<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Usuario</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3 class="mb-0">Detalle del Usuario</h3>
            </div>
            <div class="card-body">
                <table class="table table-bordered">
                    <tr>
                        <th width="30%">ID:</th>
                        <td th:text="${usuario.id}"></td>
                    </tr>
                    <tr>
                        <th>Nombre:</th>
                        <td th:text="${usuario.nombre}"></td>
                    </tr>
                    <tr>
                        <th>Email:</th>
                        <td th:text="${usuario.email}"></td>
                    </tr>
                    <tr>
                        <th>Teléfono:</th>
                        <td th:text="${usuario.telefono}"></td>
                    </tr>
                    <tr>
                        <th>Edad:</th>
                        <td th:text="${usuario.edad}"></td>
                    </tr>
                    <tr>
                        <th>Fecha Registro:</th>
                        <td th:text="${#temporals.format(usuario.fechaRegistro, 'dd/MM/yyyy HH:mm:ss')}"></td>
                    </tr>
                </table>
                
                <div class="mb-3">
                    <a th:href="@{/usuarios}" class="btn btn-secondary">Volver al Listado</a>
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-warning">Editar</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
